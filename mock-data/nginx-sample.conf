server {
    listen 443 ssl http2;
    server_name portal.openbase-demo.local;

    ssl_certificate     /etc/nginx/certs/portal.crt;
    ssl_certificate_key /etc/nginx/certs/portal.key;
    server_tokens on;

    access_log /var/log/nginx/portal_access.log main;
    error_log  /var/log/nginx/portal_error.log warn;

    location / {
        proxy_pass http://portal_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
        proxy_connect_timeout 3s;
    }

    location /downloads/ {
        autoindex on;
        alias /srv/files/public/;
    }

    location /healthz {
        return 200 "ok";
    }
}

upstream portal_backend {
    least_conn;
    server 10.20.0.11:8080 max_fails=2 fail_timeout=10s;
    server 10.20.0.12:8080 max_fails=2 fail_timeout=10s;
    keepalive 32;
}
